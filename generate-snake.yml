name: Generate Snake Contribution Grid

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 */12 * * *"
  # Allows you to run the workflow manually from the Actions tab
  workflow_dispatch:

# The permissions needed to update the 'output' branch
permissions:
  contents: write

jobs:
  build:
    name: Generate
    runs-on: ubuntu-latest
    steps:
      - name: Generate the snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          # These paths define where the generated GIFs will be stored on the output branch
          outputs: |
            dist/github-contribution-grid-snake.gif
            dist/github-contribution-grid-snake-dark.gif?color_snake=#7bc96f&color_dots=#161b22,#0e4429,#006d35,#26a641,#39d353
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push the generated GIFs to the output branch
        uses: crazy-max/github-action-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "Update contribution snake animation [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
